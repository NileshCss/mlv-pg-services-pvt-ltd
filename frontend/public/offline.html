<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | MLV PG Services</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0A0E1A;
      color: #FFFFFF;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      box-sizing: border-box;
      padding: 24px;
    }
    .container {
      max-width: 400px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(15, 22, 41, 0.6);
      border: 1px solid rgba(200, 132, 10, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 16px;
      border: 2px solid rgba(200, 132, 10, 0.3);
      padding: 4px;
      background: rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: #FFFFFF;
    }
    p {
      font-size: 14px;
      color: #9CA3AF;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #C8840A, #F5A623);
      color: #000000;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      box-sizing: border-box;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:hover {
      box-shadow: 0 4px 16px rgba(200, 132, 10, 0.3);
    }
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #6B7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/logo.png" alt="MLV PG Logo" class="logo" onerror="this.src='/favicon.png'">
    <h1>You are Offline</h1>
    <p>Please check your internet connection. Once you are back online, you can access your room allocations, pay installments, and track complaints.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="footer">MLV PG Services Pvt Ltd</div>
  </div>
</body>
</html>
