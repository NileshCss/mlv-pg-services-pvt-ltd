[build]
  # Next.js 15 build command
  command = "npm ci && npm run build"
  # Functions directory for Netlify functions (if used)
  functions = "netlify/functions"
  # Publish directory - points to Next.js build output
  publish = ".next"
  # Node version
  environment = { NODE_VERSION = "20.x" }

[dev]
  # Development server configuration
  command = "npm run dev"
  port = 3000

# ─────────────────────────────────────────────────────────
# Redirects for Next.js client-side routing
# ─────────────────────────────────────────────────────────
[[redirects]]
  # Catch all routes and let Next.js handle routing
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ─────────────────────────────────────────────────────────
# Cache Headers for Optimized Performance
# ─────────────────────────────────────────────────────────

# Cache Next.js static assets immutably
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images immutably
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache API responses for 1 hour
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600"

# Default cache policy
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    # Security Headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    # CORS for Supabase
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Referrer-Policy = "strict-origin-when-cross-origin"


# Environment variables for Netlify deployment
[context.production]
  # Set environment variables in Netlify dashboard instead
  # Use these as reference:
  # NEXT_PUBLIC_SUPABASE_URL=your_supabase_url
  # NEXT_PUBLIC_SUPABASE_ANON_KEY=your_supabase_anon_key
  # SUPABASE_SERVICE_ROLE_KEY=your_service_role_key
  [context.production.environment]
    NODE_ENV = "production"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "development"
